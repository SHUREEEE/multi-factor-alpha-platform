<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Multi-factor alpha research pipeline</title>
  <desc id="desc">A seven-stage pipeline from universe construction to attribution, with portfolio construction feeding costs and capacity controls and attribution feeding a quarantine gate.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f3a46"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1120" height="360" fill="#f7f8fa"/>
  <text x="56" y="46" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17202a">Seven-Pillar Research &amp; Risk Engineering Flow</text>
  <text x="56" y="74" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#52616f">Research evidence moves left to right; risk controls and claim gates sit beside the portfolio and attribution layers.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="650" text-anchor="middle">
    <g filter="url(#shadow)">
      <rect x="56" y="132" width="112" height="62" rx="8" fill="#ffffff" stroke="#c7d0d9"/>
      <rect x="200" y="132" width="112" height="62" rx="8" fill="#ffffff" stroke="#c7d0d9"/>
      <rect x="344" y="132" width="112" height="62" rx="8" fill="#ffffff" stroke="#c7d0d9"/>
      <rect x="488" y="132" width="112" height="62" rx="8" fill="#ffffff" stroke="#c7d0d9"/>
      <rect x="632" y="132" width="112" height="62" rx="8" fill="#ffffff" stroke="#c7d0d9"/>
      <rect x="776" y="132" width="112" height="62" rx="8" fill="#ffffff" stroke="#c7d0d9"/>
      <rect x="920" y="132" width="112" height="62" rx="8" fill="#ffffff" stroke="#c7d0d9"/>
      <rect x="632" y="250" width="136" height="62" rx="8" fill="#eef6f2" stroke="#91b9a2"/>
      <rect x="920" y="250" width="136" height="62" rx="8" fill="#fff3e8" stroke="#ddb084"/>
      <rect x="776" y="40" width="158" height="58" rx="8" fill="#eef2ff" stroke="#9aa9dc"/>
    </g>
    <text x="112" y="168" fill="#17202a">Universe</text>
    <text x="256" y="168" fill="#17202a">Data</text>
    <text x="400" y="168" fill="#17202a">Factors</text>
    <text x="544" y="168" fill="#17202a">Alpha Combo</text>
    <text x="688" y="168" fill="#17202a">Portfolio</text>
    <text x="832" y="168" fill="#17202a">Backtest</text>
    <text x="976" y="168" fill="#17202a">Attribution</text>
    <text x="700" y="276" fill="#214e35">Costs &amp;</text>
    <text x="700" y="294" fill="#214e35">Capacity</text>
    <text x="988" y="276" fill="#784713">Quarantine</text>
    <text x="988" y="294" fill="#784713">Gate</text>
    <text x="855" y="64" fill="#243f8f">Gross vs Net</text>
    <text x="855" y="82" fill="#243f8f">Diagnostics</text>
  </g>

  <g fill="none" stroke="#2f3a46" stroke-width="2.2" marker-end="url(#arrow)">
    <path d="M168 163 H196"/>
    <path d="M312 163 H340"/>
    <path d="M456 163 H484"/>
    <path d="M600 163 H628"/>
    <path d="M744 163 H772"/>
    <path d="M888 163 H916"/>
    <path d="M688 194 V246"/>
    <path d="M976 194 V246"/>
    <path d="M832 132 V102"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#52616f">
    <text x="60" y="226">Tradable scope</text>
    <text x="204" y="226">Point-in-time inputs</text>
    <text x="348" y="226">IC, decay, turnover</text>
    <text x="492" y="226">Signal selection</text>
    <text x="636" y="226">Risk-aware weights</text>
    <text x="780" y="226">T+1 evidence</text>
    <text x="924" y="226">Factor vs alpha</text>
  </g>
</svg>
